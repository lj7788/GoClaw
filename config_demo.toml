[channels_config.dingtalk]
enable = false
client_id = "your-dingtalk-client-id"
client_secret = "your-dingtalk-client-secret"
allowed_users = ["*"]

[channels_config.lark]
enable = false
app_id = "your-lark-app-id"
app_secret = "your-lark-app-secret"
allowed_users = ["*"]

[channels_config.wecom]
enable = true
bot_id = "your-wecom-bot-id"
bot_secret = "your-wecom-bot-secret"
allowed_users = ["*"]
default_to = "your-default-recipient" 

[memory]
backend = "sqlite"
auto_save = true
hygiene_enabled = true
archive_after_days = 7
purge_after_days = 30
conversation_retention_days = 30
embedding_provider = "none"
embedding_model = "text-embedding-3-small"
embedding_dimensions = 1536
vector_weight = 0.7
keyword_weight = 0.3
min_relevance_score = 0.4
embedding_cache_size = 10000
chunk_max_tokens = 512
response_cache_enabled = false
response_cache_ttl_minutes = 60
response_cache_max_entries = 5000
snapshot_enabled = false
snapshot_on_hygiene = false
auto_hydrate = true

[memory.qdrant]
collection = "zeroclaw_memories"

[storage.provider.config]
provider = ""
schema = "public"
table = "memories"

[tunnel]
provider = "none"

[gateway]
port = 42617
host = "127.0.0.1"
locale = "zh-CN"
require_pairing = false
allow_public_bind = false
paired_tokens = []
pair_rate_limit_per_minute = 10
webhook_rate_limit_per_minute = 60
trust_forwarded_headers = false
rate_limit_max_keys = 10000
idempotency_ttl_secs = 300
idempotency_max_keys = 10000

[composio]
enabled = false
entity_id = "default"

[secrets]
encrypt = false

[browser]
enabled = false
allowed_domains = []
backend = "agent_browser"
native_headless = true
native_webdriver_url = "http://127.0.0.1:9515"

[browser.computer_use]
endpoint = "http://127.0.0.1:8787/v1/actions"
timeout_ms = 15000
allow_remote_endpoint = false
window_allowlist = []

[http_request]
enabled = true
allowed_domains = ["oapi.dingtalk.com", "api.tianqiapi.com"]
max_response_size = 1000000
timeout_secs = 30

[multimodal]
max_images = 4
max_image_size_mb = 5
allow_remote_fetch = false

[web_fetch]
enabled = false
allowed_domains = ["*"]
blocked_domains = []
max_response_size = 500000
timeout_secs = 30

[web_search]
enabled = false
provider = "duckduckgo"
max_results = 5
timeout_secs = 15

[proxy]
enabled = false
no_proxy = []
scope = "zeroclaw"
services = []

[identity]
format = "aieos"
aieos_path = "identity.json"

[cost]
enabled = false
daily_limit_usd = 10.0
monthly_limit_usd = 100.0
warn_at_percent = 80
allow_override = false

