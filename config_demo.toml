default_temperature = 0.7
model_routes = []
embedding_routes = []

[model_providers]

[observability]
backend = "none"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = [
    "git",
    "npm",
    "cargo",
    "ls",
    "cat",
    "grep",
    "find",
    "echo",
    "pwd",
    "wc",
    "head",
    "tail",
    "date",
]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "~/.ssh",
    "~/.gnupg",
    "~/.aws",
    "~/.config",
]
max_actions_per_hour = 20
max_cost_per_day_cents = 500
require_approval_for_medium_risk = false
block_high_risk_commands = true
shell_env_passthrough = []
auto_approve = [
    "memory_store",
    "answer",
    "file_write",
    "content_search",
    "http_request",
    "file_read",
]
always_ask = [
    "memory_store",
    "memory_recall",
    "file_read",
]
allowed_roots = []
non_cli_excluded_tools = ["shell"]

[security.sandbox]
backend = "auto"
firejail_args = []

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "audit.log"
max_size_mb = 100
sign_events = false

[security.otp]
enabled = false
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = [
    "file_write",
    "browser_open",
    "browser",
    "memory_forget",
]
gated_domains = []
gated_domain_categories = []

[security.estop]
enabled = false
state_file = "~/.goclaw/estop-state.json"
require_otp_to_resume = true

[security.syscall_anomaly]
enabled = false
baseline_syscalls = []
alert_threshold = 10
block_suspicious = false
max_alerts_per_minute = 5
alert_cooldown_secs = 60
log_path = "syscall-anomalies.log"
alert_on_unknown_syscall = true
strict_mode = false
max_denied_events_per_minute = 5
max_total_events_per_minute = 120

[runtime]
kind = "native"

[runtime.docker]
image = "alpine:3.20"
network = "none"
memory_limit_mb = 512
cpu_limit = 1.0
read_only_rootfs = true
mount_workspace = true
allowed_workspace_roots = []

[runtime.wasm]
enabled = false
fuel_limit = 1000000000
memory_limit_mb = 64
max_module_size_mb = 10
tools_dir = ""
allowed_hosts = []
allow_workspace_read = false
allow_workspace_write = false

[runtime.wasm.security]
module_hash_policy = "Disabled"
capability_escalation_mode = "Disabled"
require_workspace_relative_tools_dir = false
strict_host_validation = false

[runtime.wasm.security.module_sha256]

[reliability]
provider_retries = 1
provider_backoff_ms = 200
fallback_providers = []
api_keys = ["your-minimax-api-key"]
channel_initial_backoff_secs = 1
channel_max_backoff_secs = 10
scheduler_poll_secs = 2
scheduler_retries = 1

[reliability.model_fallbacks]

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 4

[agent]
compact_context = true
max_tool_iterations = 15
max_history_messages = 20
parallel_tools = false
tool_dispatcher = "auto"

[skills]
open_skills_enabled = false
prompt_injection_mode = "full"

[query_classification]
enabled = false
rules = []

[heartbeat]
enabled = false
interval_minutes = 30

[cron]
enabled = true
max_run_history = 50

[channels_config]
cli = true
message_timeout_secs = 60
